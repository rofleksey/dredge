        denied_users:
          type: string
          default: ""
        included_channels:
          type: string
          default: "*"
        denied_channels:
          type: string
          default: ""
    UpdateRuleRequest:
      type: object
      required: [regex, included_users, denied_users, included_channels, denied_channels]
      properties:
        regex:
          type: string
        included_users:
          type: string
        denied_users:
          type: string
        included_channels:
          type: string
        denied_channels:
          type: string
    NotificationEntry:
      type: object
      required: [id, provider, settings, enabled, created_at]
      properties:
        id:
          type: integer
          format: int64
        provider:
          type: string
          enum: [telegram, webhook]
        settings:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
    CreateNotificationRequest:
      type: object
      required: [provider, settings]
      properties:
        provider:
          type: string
          enum: [telegram, webhook]
        settings:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
          default: true
    UpdateNotificationRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [telegram, webhook]
        settings:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
    TwitchAccount:
      type: object
      required: [id, username, account_type, created_at]
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        account_type:
          type: string
          enum: [main, bot]
        created_at:
          type: string
          format: date-time
    CreateTwitchAccountRequest:
      type: object
      required: [id, username, refresh_token]
      properties:
        id:
          type: integer
          format: int64
          description: Twitch user id for this OAuth identity (same as Helix user id)
        username:
          type: string
        refresh_token:
          type: string
        account_type:
          type: string
          enum: [main, bot]
          default: main
    UpdateTwitchAccountRequest:
      type: object
      required: [account_type]
      properties:
        account_type:
          type: string
          enum: [main, bot]
    StartTwitchOAuthRequest:
      type: object
      properties:
        return_url:
          type: string
          description: >
            Optional SPA URL to open after OAuth (same scheme/host/port as configured twitch.oauth_return_url).
            For hash routers, include the route in the fragment (e.g. http://localhost/#/settings?t=1).
    StartTwitchOAuthResponse:
      type: object
      required: [authorize_url]
      properties:
        authorize_url:
          type: string
          description: Twitch authorize URL; redirect the user here (e.g. window.location.assign)
    SendMessageRequest:
      type: object
      required: [account_id, channel, message]
      properties:
        account_id:
          type: integer
          format: int64
        channel:
          type: string
        message:
          type: string
    ChatHistoryEntry:
      type: object
      required: [id, channel, user, message, keyword_match, chatter_marked, chatter_is_sus, source, created_at, badge_tags]
      properties:
        id:
          type: integer
          format: int64
        channel:
          type: string
          description: Channel login where the message appeared
        user:
          type: string
        chatter_user_id:
          type: integer
          format: int64
          nullable: true
          description: Twitch user id of the chatter when known
        chatter_marked:
          type: boolean
          description: Whether the chatter is marked in dredge
        chatter_is_sus:
          type: boolean
          description: Whether the chatter is flagged as suspicious
        message:
          type: string
        keyword_match:
          type: boolean
        source:
          type: string
          description: "irc: observed in chat; sent: posted via dredge"
          enum: [irc, sent]
        created_at:
          type: string
          format: date-time
        badge_tags:
          type: array
          description: Twitch chat roles / badges for display (e.g. mod, VIP, verified bot, other badges)
          items:
            type: string
            enum: [moderator, vip, bot, other]
