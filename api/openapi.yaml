        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    Rule:
      type: object
      required: [id, regex, included_users, denied_users, included_channels, denied_channels]
      properties:
        id:
          type: integer
          format: int64
        regex:
          type: string
        included_users:
          type: string
        denied_users:
          type: string
        included_channels:
          type: string
        denied_channels:
          type: string
    CreateRuleRequest:
      type: object
      required: [regex]
